name: Build FileAI

# 让 checkout/setup-* 等 Action 在 Node 24 运行时执行，避免 Node 20 弃用警告
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 默认 GITHUB_TOKEN 只有读权限，创建 Release 必须显式放开
# 若仍报 403：仓库 Settings → Actions → General → Workflow permissions → Read and write
permissions:
  contents: write

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-backend:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: fileai-backend
            tauri_target: fileai-backend-aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: fileai-backend.exe
            tauri_target: fileai-backend-x86_64-pc-windows-msvc.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Create empty .env for build
        shell: bash
        run: |
          echo "DEEPSEEK_API_KEY=" > backend/.env
          echo "OPENAI_API_KEY=" >> backend/.env

      - name: Build backend binary (macOS)
        if: matrix.os == 'macos-latest'
        run: pyinstaller --clean --noconfirm fileai-backend.spec

      - name: Build backend binary (Windows)
        if: matrix.os == 'windows-latest'
        run: pyinstaller --clean --noconfirm fileai-backend.spec

      - name: Upload backend binary
        uses: actions/upload-artifact@v7
        with:
          name: backend-${{ matrix.target }}
          path: dist/${{ matrix.binary_name }}
          retention-days: 1

  build-tauri:
    needs: build-backend
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            tauri_target: fileai-backend-aarch64-apple-darwin
            binary_suffix: ''
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            tauri_target: fileai-backend-x86_64-pc-windows-msvc.exe
            binary_suffix: '.exe'

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Download backend binary
        uses: actions/download-artifact@v8
        with:
          name: backend-${{ matrix.target }}
          path: frontend/src-tauri/binaries/

      - name: Rename binary for Tauri sidecar
        shell: bash
        run: |
          src="frontend/src-tauri/binaries/fileai-backend${{ matrix.binary_suffix }}"
          dst="frontend/src-tauri/binaries/${{ matrix.tauri_target }}"
          mv "$src" "$dst"
          chmod +x "$dst" || true

      - name: Build Tauri app (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: frontend
        run: npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Tauri app (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: frontend
        run: npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v7
        with:
          name: FileAI-macOS
          path: frontend/src-tauri/target/release/bundle/dmg/
          if-no-files-found: error
          retention-days: 30

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: FileAI-Windows
          path: frontend/src-tauri/target/release/bundle/
          if-no-files-found: error
          retention-days: 30

  release:
    needs: build-tauri
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v8
        with:
          name: FileAI-macOS
          path: artifacts/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v8
        with:
          name: FileAI-Windows
          path: artifacts/windows

      - name: List release candidates
        run: find artifacts -type f \( -name '*.dmg' -o -name '*.msi' -o -name '*.exe' \) -print

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # download-artifact 会保留上传时的相对路径，用递归 glob 匹配
          files: |
            artifacts/macos/**/*.dmg
            artifacts/windows/**/*.msi
            artifacts/windows/**/*.exe
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
